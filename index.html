<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元旦晚会</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <header>
        <h1>运动晚会</h1>
        <p>欢迎各位的参加与观看！</p>
    </header>

    <main>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <section id="program-outline">
                <h2>节目大纲</h2>
                <ul id="program-list"></ul>
            </section>
            
            <!-- 添加晚会信息 -->
            <section id="event-info">
                <p>晚会主题：XXX</p>
                <p>日期：2024年11月20日</p>
                <p>主持人：XXX</p>
            </section>

            <section id="current-time">
                <h2>当前时间</h2>
                <p id="timeDisplay"></p>
            </section>
        </div>

        <section id="program-schedule">
            <!-- 原程序时间表代码 -->
        </section>

        <section id="program-schedule">
            <h2>节目: </h2>
            <table>
                <thead>
                    <tr>
                        <th>节目名称</th>
                        <th>演员</th>
                        <th>时间</th>
                        <th>节目链接</th>
                    </tr>
                </thead>
                <tbody id="program-table"></tbody>
            </table>
        </section>
    </main>
    
    <!-- 手动添加节目按钮 -->
    <button id="add-button">添加节目</button>

    <footer>
        <p>感谢各位的参与，祝大家开心！</p>
    </footer>

    <script src="./script.js"></script>
</body>

</html>
