<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运动晚会</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body class="halloween-theme">
    <header>
        <h1 id="typed-title"></h1>
    </header>

    <main>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <section id="program-outline">
                <h2>节目大纲</h2>
                <ul id="program-list"></ul>
            </section>

            <!-- 添加晚会信息 -->
            <section id="event-info">
                <img src="https://www.akuziti.cn/make/?text=%E8%BF%90%E5%8A%A8%E6%99%9A%E4%BC%9A&font=10012&size=60&ztys=ffffff&bjys=222222&touying=0&jiacu=1&jiaodu=0&lpx=&tpx=&width=&height=&time=1731246036000" alt="logo" />
                <p>晚会主题：XXX</p>
                <p>日期：2024年11月XX日</p>
                <p>主持人：XXX</p>
            </section>

            <section id="current-time">
                <h2>当前时间</h2>
                <p id="timeDisplay"></p>
            </section>
        </div>

        <section id="program-schedule">
            <!-- 原程序时间表代码 -->
        </section>

        <section id="program-schedule">
            <h2>节目: </h2>
            <table>
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>节目名称</th>
                        <th>演员</th>
                        <th>时间</th>
                        <th>节目链接</th>
                    </tr>
                </thead>
                <tbody id="program-table"></tbody>
            </table>
        </section>
    </main>


    <div id="add-program-div">
        !<button id="add-button">添加节目(功能待开发中...)</button>
    </div>

    <footer>
        <p>感谢各位的参与，祝大家开心！</p>
    </footer>

    <script src="./script.js"></script>
</body>

</html>
